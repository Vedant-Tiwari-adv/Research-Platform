version: '3.8'

services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: researchiq-mlflow
    ports:
      - "5000:5000"
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_DEFAULT_REGION=${AWS_REGION:-us-east-1}
    volumes:
      - ./mlflow_data:/app/mlflow_data
    command: mlflow server --backend-store-uri sqlite:///app/mlflow_data/mlflow.db --default-artifact-root s3://${S3_BUCKET_NAME:-researchiq-demo-data}/mlflow-artifacts/ --host 0.0.0.0 --port 5000
    restart: always

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME:-researchiq-demo-data}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - ./backend/chroma_data:/app/chroma_data
    depends_on:
      - mlflow
    restart: always

  frontend:
    build:
      context: ./research-platform
      args:
        - VITE_BACKEND_URL=http://localhost:8000
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
